<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Organic Shop</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/modern-normalize/3.0.1/modern-normalize.min.css"
    />
    <link rel="stylesheet" href="./css/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-container">
        <a class="logo" href="./index.html" aria-label="Organic Shop home">
          <span>Organic</span>
          <span>
            Shop
            <svg class="logo-icon" width="34" height="34" viewBox="0 0 32 32" aria-hidden="true">
              <path d="M28 4C17.8 4.4 9.2 9.6 7.1 17.1c-.7 2.5-.3 4.8 1 6.5L4 27.7 5.9 30l4.3-4.3c2.1 1.1 4.9 1 7.5-.3C24.6 22 28.2 13.5 28 4Zm-3.1 3.1c-.5 6.4-3.5 12.8-8.5 15.3-1.5.8-3.1 1-4.3.6l9.6-9.6-2-2-9.5 9.5c-.4-1-.4-2.2 0-3.4C11.8 12.2 17.8 7.9 24.9 7.1Z"></path>
            </svg>
          </span>
        </a>

        <nav class="site-nav" aria-label="Main navigation">
          <ul class="nav-list">
            <li><a class="nav-link current" href="#home">Home</a></li>
            <li><a class="nav-link" href="#mission">Mission</a></li>
            <li><a class="nav-link" href="#benefits">Benefits</a></li>
            <li><a class="nav-link" href="#assortment">Assortment</a></li>
            <li><a class="nav-link" href="#feedbacks">Feedbacks</a></li>
            <li><a class="nav-link" href="#faq">FAQ</a></li>
            <li><a class="nav-link" href="#contacts">Contacts</a></li>
          </ul>
        </nav>

        <a class="order-button" href="#order">Order</a>

        <button class="menu-button" type="button" aria-label="Open mobile menu">
          <svg class="menu-button-icon" width="26" height="26" viewBox="0 0 32 32" aria-hidden="true">
            <path d="M5 8h22v3H5V8Zm0 6.5h22v3H5v-3ZM5 21h22v3H5v-3Z"></path>
          </svg>
        </button>
      </div>
    </header>

    

    <div class="mobile-menu" id="mobile-menu">
      <div class="mobile-menu-inner">
        <button class="mobile-menu-close" type="button" aria-label="Close mobile menu">
          <svg width="22" height="22" viewBox="0 0 32 32" aria-hidden="true">
            <path d="M8.2 6.4 16 14.2l7.8-7.8 1.8 1.8-7.8 7.8 7.8 7.8-1.8 1.8-7.8-7.8-7.8 7.8-1.8-1.8 7.8-7.8-7.8-7.8 1.8-1.8Z"></path>
          </svg>
        </button>

        <a class="logo mobile-logo" href="./index.html" aria-label="Organic Shop home">
          <span>Organic</span>
          <span>
            Shop
            <svg class="logo-icon" width="34" height="34" viewBox="0 0 32 32" aria-hidden="true">
              <path d="M28 4C17.8 4.4 9.2 9.6 7.1 17.1c-.7 2.5-.3 4.8 1 6.5L4 27.7 5.9 30l4.3-4.3c2.1 1.1 4.9 1 7.5-.3C24.6 22 28.2 13.5 28 4Zm-3.1 3.1c-.5 6.4-3.5 12.8-8.5 15.3-1.5.8-3.1 1-4.3.6l9.6-9.6-2-2-9.5 9.5c-.4-1-.4-2.2 0-3.4C11.8 12.2 17.8 7.9 24.9 7.1Z"></path>
            </svg>
          </span>
        </a>

        <nav class="mobile-nav" aria-label="Mobile navigation">
          <ul class="mobile-nav-list">
            <li><a class="mobile-nav-link" href="#home">Home</a></li>
            <li><a class="mobile-nav-link" href="#mission">Mission</a></li>
            <li><a class="mobile-nav-link" href="#benefits">Benefits</a></li>
            <li><a class="mobile-nav-link" href="#assortment">Assortment</a></li>
            <li><a class="mobile-nav-link" href="#feedbacks">Feedbacks</a></li>
            <li><a class="mobile-nav-link" href="#faq">FAQ</a></li>
            <li><a class="mobile-nav-link" href="#contacts">Contacts</a></li>
          </ul>

          <a class="mobile-order-button" href="#order">Order</a>
</nav>
</div>
    </div>

    

    <script>
      const menuButton = document.querySelector(".menu-button");
      const mobileMenu = document.querySelector(".mobile-menu");
      const closeButton = document.querySelector(".mobile-menu-close");

      function openMobileMenu() {
        mobileMenu.classList.add("is-open");
      }

      function closeMobileMenu() {
        mobileMenu.classList.remove("is-open");
      }

      menuButton.addEventListener("click", openMobileMenu);
      menuButton.addEventListener("mouseenter", openMobileMenu);
      menuButton.addEventListener("focus", openMobileMenu);

      closeButton.addEventListener("click", closeMobileMenu);
      mobileMenu.addEventListener("mouseleave", closeMobileMenu);

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") {
          closeMobileMenu();
        }
      });
    </script>

  </body>
</html>
